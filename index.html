<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RLM 5 - Türkçe Yapay Zeka Asistan | Troye Ekibi</title>
    <meta name="description" content="RLM 5, Türkiye'nin en gelişmiş ücretsiz yapay zeka asistanı. Kod yazma, makale oluşturma, soru cevaplama ve daha fazlası için Troye Ekibi tarafından geliştirildi.">
    <meta name="keywords" content="yapay zeka, AI asistan, Türkçe chatbot, ücretsiz AI, RLM 5, Troye Ekibi">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://rlm5.vercel.app/">
    <meta name="theme-color" content="#0881F0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230881F0'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-family='system-ui' font-weight='bold'>R</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body { background: #f0f4f8; }
        .dark body { background: #0a0a0a; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-user, .msg-ai { animation: slideIn 0.3s ease; }
        
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        .typing span { animation: bounce 1.4s infinite ease-in-out; display: inline-block; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.75rem 0; }
        code:not(pre code) { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 0.875rem; }
        .dark code:not(pre code) { background: #334155; color: #f1f5f9; }
        .dark pre { background: #0f172a; }
        
        .btn { transition: all 0.2s ease; }
        .btn:hover { transform: translateY(-1px); }
        textarea { resize: none; }
        
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
        .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
        
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .sidebar-open { transform: translateX(0) !important; }
        .search-active { color: #22c55e !important; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; width: 280px !important; }
            .overlay { display: none; }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <!-- Mobile Overlay -->
    <div id="overlay" class="overlay fixed inset-0 bg-black/50 z-40 md:hidden" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-72 h-full bg-white dark:bg-[#111] border-r border-gray-200 dark:border-gray-800 flex flex-col fixed md:relative -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#0881F0] to-[#00D4FF] flex items-center justify-center">
                <span class="text-white font-bold text-lg">R</span>
            </div>
            <div>
                <h1 class="font-semibold text-gray-900 dark:text-white">RLM 5</h1>
                <p class="text-xs text-gray-500">Troye Ekibi</p>
            </div>
        </div>
        
        <div class="p-3">
            <button id="btnNewChat" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-gradient-to-r from-[#0881F0] to-[#00D4FF] text-white font-medium rounded-xl btn">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span>Yeni Sohbet</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 py-2">
            <p class="px-2 py-2 text-xs font-medium text-gray-400 uppercase">Geçmiş</p>
            <div id="chatList"></div>
        </div>
        
        <div class="p-3 border-t border-gray-100 dark:border-gray-800 space-y-1">
            <button id="btnClear" class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span class="text-sm">Sohbetleri Temizle</span>
            </button>
            <button id="btnTheme" class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                <span class="text-sm">Tema Değiştir</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full min-w-0">
        <!-- Header -->
        <header class="shrink-0 px-4 py-3 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-[#0a0a0a] flex items-center justify-between md:hidden">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                <i data-lucide="menu" class="w-5 h-5 text-gray-700 dark:text-gray-300"></i>
            </button>
            <h2 class="font-medium text-gray-700 dark:text-gray-300">RLM 5</h2>
            <div class="w-10"></div>
        </header>
        
        <div class="shrink-0 px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-[#0a0a0a]/80 backdrop-blur-md hidden md:block">
            <h2 id="chatTitle" class="font-medium text-gray-700 dark:text-gray-300">Yeni Sohbet</h2>
        </div>
        
        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto">
            <div id="welcome" class="h-full flex flex-col items-center justify-center px-6 py-12">
                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#0881F0] to-[#00D4FF] flex items-center justify-center mx-auto mb-6 shadow-2xl">
                    <span class="text-white font-bold text-3xl">R</span>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white mb-3 text-center">
                    Merhaba, ben <span class="bg-gradient-to-r from-[#0881F0] to-[#00D4FF] bg-clip-text text-transparent">RLM 5</span>
                </h1>
                <p class="text-gray-500 dark:text-gray-400 mb-8 text-center">Size nasıl yardımcı olabilirim?</p>
                
                <div class="grid grid-cols-2 gap-3 max-w-md w-full">
                    <button onclick="quickAsk('Kod yazmama yardımcı ol')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-xl text-left">
                        <i data-lucide="code-2" class="w-5 h-5 text-[#0881F0] mb-2"></i>
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Kod Yaz</p>
                    </button>
                    <button onclick="quickAsk('Bir makale yaz')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-xl text-left">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-[#00D4FF] mb-2"></i>
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Yazı Yaz</p>
                    </button>
                    <button onclick="quickAsk('Soru soracağım')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-xl text-left">
                        <i data-lucide="help-circle" class="w-5 h-5 text-purple-500 mb-2"></i>
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Soru Sor</p>
                    </button>
                    <button onclick="quickAsk('Bir rapor hazırla')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-xl text-left">
                        <i data-lucide="file-text" class="w-5 h-5 text-green-500 mb-2"></i>
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Rapor Hazırla</p>
                    </button>
                </div>
            </div>
            
            <div id="chatContainer" class="hidden max-w-3xl mx-auto px-4 md:px-6 py-6 space-y-4"></div>
        </div>
        
        <!-- Input -->
        <div class="shrink-0 px-4 md:px-6 pb-4 md:pb-6 pt-2">
            <div class="max-w-3xl mx-auto">
                <div class="relative bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-2xl shadow-lg transition-shadow focus-within:shadow-xl focus-within:border-[#0881F0]">
                    <div class="flex items-center gap-2 px-3 pt-2">
                        <!-- Pro/Normal Mode Toggle -->
                        <button id="btnPro" onclick="togglePro()" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-all bg-gradient-to-r from-amber-100 to-orange-100 dark:from-amber-900/30 dark:to-orange-900/30 text-amber-600 dark:text-amber-400 hover:from-amber-200 hover:to-orange-200">
                            <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                            <span id="proLabel">PRO</span>
                        </button>
                        <button id="btnSearch" onclick="toggleSearch()" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-all bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700">
                            <i data-lucide="globe" class="w-3.5 h-3.5"></i>
                            <span>Araştır</span>
                            <i data-lucide="check" class="w-3 h-3 hidden search-active:text-green-500" id="searchCheck"></i>
                        </button>
                        <label class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-all bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 hover:bg-purple-200 dark:hover:bg-purple-900/50 cursor-pointer">
                            <i data-lucide="image" class="w-3.5 h-3.5"></i>
                            <span>Resim</span>
                            <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                        </label>
                    </div>
                    <!-- Image Preview -->
                    <div id="imagePreview" class="hidden px-3 pb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                        </div>
                    </div>
                    <textarea 
                        id="input" 
                        rows="1" 
                        class="w-full px-4 py-3 pr-12 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 outline-none max-h-32 text-sm md:text-base"
                        placeholder="Mesaj yazın veya resim ekleyin..."
                    ></textarea>
                    <button id="btnSend" class="absolute right-2 bottom-2 w-9 h-9 md:w-10 md:h-10 flex items-center justify-center bg-gradient-to-br from-[#0881F0] to-[#00D4FF] text-white rounded-xl disabled:opacity-40 btn" disabled>
                        <i data-lucide="arrow-up" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>
                </div>
                <p class="text-center text-xs text-gray-400 mt-2">RLM 5 ❤️ | Troye Ekibi</p>
            </div>
        </div>
    </main>
    
    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 z-50"></div>

    <script>
        lucide.createIcons();
        
        const input = document.getElementById('input');
        const btnSend = document.getElementById('btnSend');
        const messages = document.getElementById('messages');
        const welcome = document.getElementById('welcome');
        const chatContainer = document.getElementById('chatContainer');
        const chatList = document.getElementById('chatList');
        const chatTitle = document.getElementById('chatTitle');
        const btnNewChat = document.getElementById('btnNewChat');
        const btnTheme = document.getElementById('btnTheme');
        const btnClear = document.getElementById('btnClear');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toast = document.getElementById('toast');

        let history = [];
        let chatId = null;
        let generating = false;
        let searchEnabled = false;
        let proEnabled = true;
        let chats = JSON.parse(localStorage.getItem('rlm_chats') || '{}');

        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('active');
        }

        function togglePro() {
            proEnabled = !proEnabled;
            const btn = document.getElementById('btnPro');
            const label = document.getElementById('proLabel');
            if (proEnabled) {
                btn.classList.add('bg-gradient-to-r', 'from-amber-100', 'to-orange-100', 'dark:from-amber-900/30', 'dark:to-orange-900/30');
                btn.classList.remove('bg-gray-100', 'dark:bg-gray-800');
                btn.classList.add('text-amber-600', 'dark:text-amber-400');
                btn.classList.remove('text-gray-600', 'dark:text-gray-400');
                label.textContent = 'PRO';
            } else {
                btn.classList.remove('bg-gradient-to-r', 'from-amber-100', 'to-orange-100', 'dark:from-amber-900/30', 'dark:to-orange-900/30');
                btn.classList.add('bg-gray-100', 'dark:bg-gray-800');
                btn.classList.remove('text-amber-600', 'dark:text-amber-400');
                btn.classList.add('text-gray-600', 'dark:text-gray-400');
                label.textContent = 'NORMAL';
            }
            showToast(proEnabled ? 'PRO modu aktif' : 'Normal mod aktif');
        }

        btnTheme.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            lucide.createIcons();
        };

        btnNewChat.onclick = () => {
            chatId = 'c_' + Date.now();
            history = [];
            welcome.classList.remove('hidden');
            chatContainer.classList.add('hidden');
            chatContainer.innerHTML = '';
            chatTitle.textContent = 'Yeni Sohbet';
            input.value = '';
            btnSend.disabled = true;
            renderChats();
            if (window.innerWidth < 768) toggleSidebar();
        };

        function quickAsk(text) {
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }

        function toggleSearch() {
            searchEnabled = !searchEnabled;
            const btn = document.getElementById('btnSearch');
            const check = document.getElementById('searchCheck');
            if (searchEnabled) {
                btn.classList.add('bg-green-100', 'dark:bg-green-900/30', 'text-green-700', 'dark:text-green-400');
                btn.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
                check.classList.remove('hidden');
            } else {
                btn.classList.remove('bg-green-100', 'dark:bg-green-900/30', 'text-green-700', 'dark:text-green-400');
                btn.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
                check.classList.add('hidden');
            }
        }

        function renderChats() {
            const ids = Object.keys(chats).sort((a, b) => chats[b].time - chats[a].time);
            if (ids.length === 0) {
                chatList.innerHTML = '<p class="px-3 py-4 text-sm text-gray-400 text-center">Henüz sohbet yok</p>';
                return;
            }
            chatList.innerHTML = ids.map(id => {
                const c = chats[id];
                const first = c.msgs.find(m => m.r === 'user');
                const title = first ? first.c.substring(0, 25) + (first.c.length > 25 ? '...' : '') : 'Yeni Sohbet';
                const active = id === chatId;
                return `<button onclick="loadChat('${id}')" class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-left text-sm ${active ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}">
                    <i data-lucide="message-circle" class="w-4 h-4 shrink-0"></i>
                    <span class="flex-1 truncate">${escapeHtml(title)}</span>
                </button>`;
            }).join('');
            lucide.createIcons();
        }

        function loadChat(id) {
            chatId = id;
            const c = chats[id];
            if (!c) return;
            history = c.msgs.map(m => ({ role: m.r, content: m.c }));
            welcome.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            c.msgs.forEach(m => addMsg(m.r, m.c));
            renderChats();
            scroll();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function save() {
            if (chatId && history.length) {
                chats[chatId] = { msgs: history.map(h => ({ r: h.role, c: h.content })), time: Date.now() };
                localStorage.setItem('rlm_chats', JSON.stringify(chats));
            }
        }

        btnClear.onclick = () => {
            if (confirm('Tüm sohbetleri sil?')) {
                chats = {};
                localStorage.removeItem('rlm_chats');
                btnNewChat.click();
                showToast('Sohbetler temizlendi');
            }
        };

        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 128) + 'px';
            btnSend.disabled = !input.value.trim() || generating;
        };

        input.onkeydown = e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!btnSend.disabled) send();
            }
        };

        btnSend.onclick = send;

        let attachedImages = [];

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('Resim 5MB dan kucuk olmali');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                attachedImages.push(dataUrl);
                showImagePreview(dataUrl);
                showToast('Resim eklendi');
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function showImagePreview(dataUrl) {
            const preview = document.getElementById('imagePreview');
            preview.classList.remove('hidden');
            const container = preview.querySelector('div');
            
            const wrapper = document.createElement('div');
            wrapper.className = 'relative inline-block';
            
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'w-16 h-16 object-cover rounded-lg border border-gray-200 dark:border-gray-700';
            
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '<i data-lucide="x" class="w-3 h-3"></i>';
            removeBtn.className = 'absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full flex items-center justify-center';
            removeBtn.onclick = function() {
                const index = attachedImages.indexOf(dataUrl);
                if (index > -1) attachedImages.splice(index, 1);
                wrapper.remove();
                if (attachedImages.length === 0) preview.classList.add('hidden');
            };
            
            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            container.appendChild(wrapper);
            lucide.createIcons();
        }

        async function send() {
            const text = input.value.trim();
            if (!text && attachedImages.length === 0) return;
            if (generating) return;
            if (!chatId) chatId = 'c_' + Date.now();

            welcome.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            
            const displayText = text || (attachedImages.length > 0 ? `📷 ${attachedImages.length} resim gonderdi` : '');
            if (displayText) {
                chatTitle.textContent = displayText.substring(0, 30) + (displayText.length > 30 ? '...' : '');
            }

            // Gorsel onizleme ekle
            let userContent = '';
            if (attachedImages.length > 0) {
                userContent = attachedImages.map(img => `<img src="${img}" class="max-w-[200px] rounded-lg my-2">`).join('');
            }
            if (text) userContent += `<p>${escapeHtml(text)}</p>`;
            
            addMsg('user', userContent);
            history.push({ role: 'user', content: text });
            
            input.value = '';
            const preview = document.getElementById('imagePreview');
            preview.classList.add('hidden');
            preview.querySelector('div').innerHTML = '';
            attachedImages = [];
            input.style.height = 'auto';
            btnSend.disabled = true;
            generating = true;

            const mid = 'm_' + Date.now();
            addMsg('ai', '<div class="typing"><span class="w-2 h-2 bg-gray-400 rounded-full"></span><span class="w-2 h-2 bg-gray-400 rounded-full mx-1"></span><span class="w-2 h-2 bg-gray-400 rounded-full"></span></div>', mid);
            scroll();

            try {
                // Resim URL'lerini mesajdan cikar
                const imageRegex = /https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp|svg|bmp|ico)(\?[^"'\s]*)?/gi;
                const imageUrls = (text.match(imageRegex) || []);
                
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text, 
                        history, 
                        search: searchEnabled,
                        imageUrls: imageUrls,
                        pro: proEnabled
                    })
                });
                const data = await res.json();
                const el = document.getElementById(mid);
                
                if (el) {
                    if (data.reply) {
                        el.innerHTML = format(data.reply);
                        history.push({ role: 'assistant', content: data.reply });
                        save();
                        renderChats();
                    } else {
                        el.innerHTML = '<p style="color:#ef4444">Hata: ' + (data.error || 'Bilinmeyen hata') + '</p>';
                    }
                }
            } catch (err) {
                const el = document.getElementById(mid);
                if (el) el.innerHTML = '<p style="color:#ef4444">Bağlantı hatası</p>';
            }

            generating = false;
            btnSend.disabled = !input.value.trim();
            scroll();
            lucide.createIcons();
        }

        function addMsg(role, content, id = null) {
            const div = document.createElement('div');
            if (id) div.id = id;
            div.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const bubble = document.createElement('div');
            const isAi = role === 'ai';
            bubble.className = isAi 
                ? 'max-w-[85%] px-4 py-3 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-2xl rounded-bl-md shadow-sm'
                : 'max-w-[85%] px-4 py-3 bg-gradient-to-br from-[#0881F0] to-[#00D4FF] text-white rounded-2xl rounded-br-md shadow-lg';
            
            if (isAi) {
                bubble.innerHTML = content;
                bubble.style.color = '#374151';
            } else {
                bubble.innerHTML = '<p style="color:white" class="text-sm leading-relaxed whitespace-pre-wrap">' + escapeHtml(content) + '</p>';
            }
            
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }

        function format(text) {
            let html = text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3 style="font-weight:600;margin-top:12px">$1</h3>')
                .replace(/^## (.+)$/gm, '<h2 style="font-weight:600;margin-top:16px">$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 style="font-weight:700;margin-top:16px">$1</h1>')
                .replace(/^- (.+)$/gm, '<li style="margin-left:16px;list-style:disc">$1</li>')
                .replace(/\n/g, '<br>');
            return '<div style="color:#374151" class="text-sm leading-relaxed"><p>' + html + '</p></div>';
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function scroll() {
            messages.scrollTop = messages.scrollHeight;
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast px-4 py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl shadow-lg text-sm font-medium';
            t.textContent = msg;
            toast.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        renderChats();
    </script>
</body>
</html>
