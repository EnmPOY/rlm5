<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLM 5</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230881F0'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-family='system-ui' font-weight='bold'>R</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #fafafa; }
        .dark body { background: #0a0a0a; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        
        .msg-user { animation: slideIn 0.3s ease; }
        .msg-ai { animation: slideIn 0.3s ease; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing span {
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        pre { background: #1a1a2e; color: #e4e4e7; padding: 1rem; border-radius: 12px; overflow-x: auto; }
        code:not(pre code) { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .dark code:not(pre code) { background: #374151; }
        
        .btn:hover { transform: translateY(-1px); }
        .btn { transition: all 0.2s ease; }
        
        textarea { resize: none; }
        textarea::-webkit-scrollbar { display: none; }
        
        .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
        
        .sidebar { transition: width 0.3s ease, opacity 0.3s ease; }
        
        .logo-glow {
            box-shadow: 0 0 60px rgba(8, 129, 240, 0.3);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }
        .dark .card-hover:hover {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-[280px] h-full bg-white dark:bg-[#111] border-r border-gray-200 dark:border-gray-800 flex flex-col">
        
        <!-- Logo -->
        <div class="p-5 border-b border-gray-100 dark:border-gray-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#0881F0] to-[#00D4FF] flex items-center justify-center logo-glow">
                    <span class="text-white font-bold text-lg">R</span>
                </div>
                <div>
                    <h1 class="font-semibold text-gray-900 dark:text-white">RLM 5</h1>
                    <p class="text-xs text-gray-500">G63 Asistan</p>
                </div>
            </div>
        </div>
        
        <!-- New Chat -->
        <div class="p-4">
            <button id="btnNewChat" class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-gradient-to-r from-[#0881F0] to-[#00D4FF] text-white font-medium rounded-xl hover:opacity-90 btn shadow-lg shadow-blue-500/20">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span>Yeni Sohbet</span>
            </button>
        </div>
        
        <!-- Chat List -->
        <div class="flex-1 overflow-y-auto px-3 py-2">
            <p class="px-2 py-2 text-xs font-medium text-gray-400 uppercase tracking-wider">Geçmiş</p>
            <div id="chatList" class="space-y-1">
                <!-- Chats here -->
            </div>
        </div>
        
        <!-- Footer -->
        <div class="p-4 border-t border-gray-100 dark:border-gray-800">
            <button id="btnClear" class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span class="text-sm">Sohbetleri Temizle</span>
            </button>
            <button id="btnTheme" class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors mt-1">
                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                <span class="text-sm">Tema Değiştir</span>
            </button>
        </div>
    </aside>
    
    <!-- Main -->
    <main class="flex-1 flex flex-col h-full min-w-0">
        
        <!-- Header -->
        <header class="shrink-0 px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-[#0a0a0a]/80 backdrop-blur-md">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h2 id="chatTitle" class="font-medium text-gray-700 dark:text-gray-300">Yeni Sohbet</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btnThink" class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 transition-colors">
                        <i data-lucide="brain" class="w-3.5 h-3.5"></i>
                        <span>Deep Think</span>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto">
            
            <!-- Welcome -->
            <div id="welcome" class="h-full flex flex-col items-center justify-center px-6 py-12">
                <div class="text-center max-w-lg mx-auto">
                    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#0881F0] to-[#00D4FF] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-blue-500/30">
                        <span class="text-white font-bold text-3xl">R</span>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-3">
                        Merhaba <span class="bg-gradient-to-r from-[#0881F0] to-[#00D4FF] bg-clip-text text-transparent">G63</span>
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 mb-10">Bugün size nasıl yardımcı olabilirim?</p>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="quickAsk('Kod yazmama yardımcı ol')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-xl text-left transition-all">
                            <i data-lucide="code-2" class="w-5 h-5 text-[#0881F0] mb-2"></i>
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Kod Yaz</p>
                            <p class="text-xs text-gray-500 mt-1">Yazılım geliştirme</p>
                        </button>
                        <button onclick="quickAsk('Bir makale yaz')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-xl text-left transition-all">
                            <i data-lucide="pen-tool" class="w-5 h-5 text-[#00D4FF] mb-2"></i>
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Yazı Yaz</p>
                            <p class="text-xs text-gray-500 mt-1">İçerik oluşturma</p>
                        </button>
                        <button onclick="quickAsk('Soru soracağım')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-xl text-left transition-all">
                            <i data-lucide="help-circle" class="w-5 h-5 text-purple-500 mb-2"></i>
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Soru Sor</p>
                            <p class="text-xs text-gray-500 mt-1">Merak ettiğiniz her şey</p>
                        </button>
                        <button onclick="quickAsk('Bir rapor hazırla')" class="card-hover p-4 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-xl text-left transition-all">
                            <i data-lucide="file-text" class="w-5 h-5 text-green-500 mb-2"></i>
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200">Rapor Hazırla</p>
                            <p class="text-xs text-gray-500 mt-1">Analiz ve özet</p>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Chat Container -->
            <div id="chatContainer" class="hidden max-w-3xl mx-auto px-6 py-8 space-y-6">
                <!-- Messages -->
            </div>
        </div>
        
        <!-- Input -->
        <div class="shrink-0 px-6 pb-6 pt-2">
            <div class="max-w-3xl mx-auto">
                <div class="relative bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl shadow-lg shadow-gray-200/50 dark:shadow-black/50 transition-shadow focus-within:shadow-xl">
                    <textarea 
                        id="input" 
                        rows="1" 
                        class="w-full px-5 py-4 pr-14 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 outline-none max-h-40"
                        placeholder="Mesajınızı yazın..."
                    ></textarea>
                    <button id="btnSend" class="absolute right-2 bottom-2 w-10 h-10 flex items-center justify-center bg-gradient-to-br from-[#0881F0] to-[#00D4FF] text-white rounded-xl disabled:opacity-40 disabled:cursor-not-allowed btn" disabled>
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-center text-xs text-gray-400 mt-3">RLM 5, G63 tarafından ❤️ ile geliştirildi</p>
            </div>
        </div>
    </main>
    
    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50"></div>

    <script>
        lucide.createIcons();

        // Elements
        const input = document.getElementById('input');
        const btnSend = document.getElementById('btnSend');
        const messages = document.getElementById('messages');
        const welcome = document.getElementById('welcome');
        const chatContainer = document.getElementById('chatContainer');
        const chatList = document.getElementById('chatList');
        const chatTitle = document.getElementById('chatTitle');
        const btnThink = document.getElementById('btnThink');
        const btnNewChat = document.getElementById('btnNewChat');
        const btnTheme = document.getElementById('btnTheme');
        const btnClear = document.getElementById('btnClear');
        const sidebar = document.getElementById('sidebar');
        const toast = document.getElementById('toast');

        // State
        let history = [];
        let chatId = null;
        let generating = false;
        let think = true;
        let chats = JSON.parse(localStorage.getItem('rlm_chats') || '{}');

        // Init
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // Theme
        btnTheme.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            lucide.createIcons();
        };

        // New Chat
        btnNewChat.onclick = () => {
            chatId = 'c_' + Date.now();
            history = [];
            welcome.classList.remove('hidden');
            welcome.classList.add('flex');
            chatContainer.classList.add('hidden');
            chatContainer.innerHTML = '';
            chatTitle.textContent = 'Yeni Sohbet';
            input.value = '';
            btnSend.disabled = true;
            renderChats();
        };

        // Quick Ask
        function quickAsk(text) {
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }

        // Render Chats
        function renderChats() {
            const ids = Object.keys(chats).sort((a, b) => chats[b].time - chats[a].time);
            
            if (ids.length === 0) {
                chatList.innerHTML = '<p class="px-3 py-4 text-sm text-gray-400 text-center">Henüz sohbet yok</p>';
                lucide.createIcons();
                return;
            }
            
            chatList.innerHTML = ids.map(id => {
                const c = chats[id];
                const first = c.msgs.find(m => m.r === 'user');
                const title = first ? first.c.substring(0, 30) + (first.c.length > 30 ? '...' : '') : 'Yeni Sohbet';
                const active = id === chatId;
                return `
                    <button onclick="loadChat('${id}')" class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-left transition-colors ${active ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}">
                        <i data-lucide="message-circle" class="w-4 h-4 shrink-0"></i>
                        <span class="flex-1 truncate text-sm">${escapeHtml(title)}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        // Load Chat
        function loadChat(id) {
            chatId = id;
            const c = chats[id];
            if (!c) return;
            
            history = c.msgs.map(m => ({ role: m.r, content: m.c }));
            welcome.classList.add('hidden');
            welcome.classList.remove('flex');
            chatContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            
            c.msgs.forEach(m => addMsg(m.r, m.c, false));
            renderChats();
            scroll();
        }

        // Save
        function save() {
            if (chatId && history.length) {
                chats[chatId] = { msgs: history.map(h => ({ r: h.role, c: h.content })), time: Date.now() };
                localStorage.setItem('rlm_chats', JSON.stringify(chats));
            }
        }

        // Clear
        btnClear.onclick = () => {
            if (confirm('Tüm sohbetleri sil?')) {
                chats = {};
                localStorage.removeItem('rlm_chats');
                btnNewChat.click();
                showToast('Sohbetler temizlendi');
            }
        };

        // Think
        btnThink.onclick = () => {
            think = !think;
            btnThink.classList.toggle('bg-blue-50 dark:bg-blue-900/30', think);
            btnThink.classList.toggle('text-blue-600 dark:text-blue-400', think);
            btnThink.classList.toggle('text-gray-500', !think);
            showToast(think ? 'Deep Think açık' : 'Deep Think kapalı');
        };

        // Input
        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 160) + 'px';
            btnSend.disabled = !input.value.trim() || generating;
        };

        // Enter
        input.onkeydown = e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!btnSend.disabled) send();
            }
        };

        // Send
        btnSend.onclick = send;

        async function send() {
            const text = input.value.trim();
            if (!text || generating) return;

            if (!chatId) {
                chatId = 'c_' + Date.now();
            }

            welcome.classList.add('hidden');
            welcome.classList.remove('flex');
            chatContainer.classList.remove('hidden');
            chatTitle.textContent = text.substring(0, 30) + (text.length > 30 ? '...' : '');

            addMsg('user', text);
            history.push({ role: 'user', content: text });
            
            input.value = '';
            input.style.height = 'auto';
            btnSend.disabled = true;
            generating = true;

            const mid = 'm_' + Date.now();
            chatContainer.classList.remove('hidden');
            chatContainer.classList.add('block');
            addMsg('ai', '<div class="typing"><span class="inline-block w-2 h-2 bg-gray-400 rounded-full"></span><span class="inline-block w-2 h-2 bg-gray-400 rounded-full mx-1"></span><span class="inline-block w-2 h-2 bg-gray-400 rounded-full"></span></div>', mid);
            scroll();

            try {
                console.log('Sending request to /api/chat...');
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history, autoThink: think })
                });
                const data = await res.json();
                console.log('Response:', data);
                const el = document.getElementById(mid);
                console.log('Element:', el);
                
                if (el) {
                    if (data.reply) {
                        el.innerHTML = format(data.reply);
                        history.push({ role: 'assistant', content: data.reply });
                        save();
                        renderChats();
                    } else {
                        el.innerHTML = `<p class="text-red-500 text-sm">${data.error || 'Hata oluştu'}</p>`;
                    }
                }
            } catch (err) {
                const el = document.getElementById(mid);
                if (el) {
                    el.innerHTML = '<p class="text-red-500 text-sm">Bağlantı hatası: ' + (err.message || 'Bilinmeyen hata') + '</p>';
                }
                console.error('Fetch error:', err);
            }

            generating = false;
            btnSend.disabled = !input.value.trim();
            scroll();
            lucide.createIcons();
        }

        // Add Message
        function addMsg(role, content, id = null, animate = true) {
            const div = document.createElement('div');
            if (id) div.id = id;
            div.className = role === 'user' ? 'flex justify-end msg-user' : 'flex justify-start msg-ai';
            
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'max-w-[80%] px-5 py-3 bg-gradient-to-br from-[#0881F0] to-[#00D4FF] text-white rounded-2xl rounded-br-md shadow-lg'
                : 'max-w-[80%] px-5 py-3 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 rounded-2xl rounded-bl-md shadow-sm';
            
            if (role === 'ai') {
                bubble.innerHTML = content;
            } else {
                bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</p>`;
            }
            
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }

        // Format
        function format(text) {
            let html = text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^# (.+)$/gm, '<h2 class="text-lg font-bold mt-4 mb-2">$1</h2>')
                .replace(/^## (.+)$/gm, '<h3 class="text-base font-semibold mt-3 mb-1">$1</h3>')
                .replace(/^- (.+)$/gm, '<li class="ml-4 list-disc">$1</li>')
                .replace(/\n/g, '<br>');
            return `<p class="text-sm leading-relaxed">${html}</p>`;
        }

        // Escape
        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        // Scroll
        function scroll() {
            messages.scrollTop = messages.scrollHeight;
        }

        // Toast
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast px-4 py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl shadow-lg text-sm font-medium';
            t.textContent = msg;
            toast.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Init
        renderChats();

        console.log('%c RLM 5 ', 'background: linear-gradient(135deg, #0881F0, #00D4FF); color: white; font-size: 20px; padding: 10px 20px; border-radius: 10px;');
    </script>
</body>
</html>
