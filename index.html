    <script>
        lucide.createIcons();

        // Elements
        const input = document.getElementById('input');
        const btnSend = document.getElementById('btnSend');
        const messages = document.getElementById('messages');
        const welcome = document.getElementById('welcome');
        const chatContainer = document.getElementById('chatContainer');
        const chatList = document.getElementById('chatList');
        const chatTitle = document.getElementById('chatTitle');
        const btnNewChat = document.getElementById('btnNewChat');
        const btnTheme = document.getElementById('btnTheme');
        const btnClear = document.getElementById('btnClear');
        const toast = document.getElementById('toast');

        // State
        let history = [];
        let chatId = null;
        let generating = false;
        let chats = JSON.parse(localStorage.getItem('rlm_chats') || '{}');

        // Init
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // Theme
        btnTheme.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            lucide.createIcons();
        };

        // New Chat
        btnNewChat.onclick = () => {
            chatId = 'c_' + Date.now();
            history = [];
            welcome.classList.remove('hidden');
            welcome.classList.add('flex');
            chatContainer.classList.add('hidden');
            chatContainer.innerHTML = '';
            chatTitle.textContent = 'Yeni Sohbet';
            input.value = '';
            btnSend.disabled = true;
            renderChats();
        };

        // Quick Ask
        function quickAsk(text) {
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }

        // Render Chats
        function renderChats() {
            const ids = Object.keys(chats).sort((a, b) => chats[b].time - chats[a].time);
            
            if (ids.length === 0) {
                chatList.innerHTML = '<p class="px-3 py-4 text-sm text-gray-400 text-center">Henüz sohbet yok</p>';
                lucide.createIcons();
                return;
            }
            
            chatList.innerHTML = ids.map(id => {
                const c = chats[id];
                const first = c.msgs.find(m => m.r === 'user');
                const title = first ? first.c.substring(0, 30) + (first.c.length > 30 ? '...' : '') : 'Yeni Sohbet';
                const active = id === chatId;
                return `
                    <button onclick="loadChat('${id}')" class="w-full flex items-center gap-2 px-3 py-2.5 rounded-lg text-left transition-colors ${active ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}" role="listitem">
                        <i data-lucide="message-circle" class="w-4 h-4 shrink-0" aria-hidden="true"></i>
                        <span class="flex-1 truncate text-sm">${escapeHtml(title)}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        // Load Chat
        function loadChat(id) {
            chatId = id;
            const c = chats[id];
            if (!c) return;
            
            history = c.msgs.map(m => ({ role: m.r, content: m.c }));
            welcome.classList.add('hidden');
            welcome.classList.remove('flex');
            chatContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            
            c.msgs.forEach(m => addMsg(m.r, m.c));
            renderChats();
            scroll();
        }

        // Save
        function save() {
            if (chatId && history.length) {
                chats[chatId] = { msgs: history.map(h => ({ r: h.role, c: h.content })), time: Date.now() };
                localStorage.setItem('rlm_chats', JSON.stringify(chats));
            }
        }

        // Clear
        btnClear.onclick = () => {
            if (confirm('Tüm sohbetleri sil?')) {
                chats = {};
                localStorage.removeItem('rlm_chats');
                btnNewChat.click();
                showToast('Sohbetler temizlendi');
            }
        };

        // Input
        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 160) + 'px';
            btnSend.disabled = !input.value.trim() || generating;
        };

        // Enter
        input.onkeydown = e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!btnSend.disabled) send();
            }
        };

        // Send
        btnSend.onclick = send;

        async function send() {
            const text = input.value.trim();
            if (!text || generating) return;

            if (!chatId) {
                chatId = 'c_' + Date.now();
            }

            welcome.classList.add('hidden');
            welcome.classList.remove('flex');
            chatContainer.classList.remove('hidden');
            chatTitle.textContent = text.substring(0, 30) + (text.length > 30 ? '...' : '');

            addMsg('user', text);
            history.push({ role: 'user', content: text });
            
            input.value = '';
            input.style.height = 'auto';
            btnSend.disabled = true;
            generating = true;

            const mid = 'm_' + Date.now();
            addMsg('ai', '<div class="typing"><span class="inline-block w-2 h-2 bg-gray-400 rounded-full"></span><span class="inline-block w-2 h-2 bg-gray-400 rounded-full mx-1"></span><span class="inline-block w-2 h-2 bg-gray-400 rounded-full"></span></div>', mid);
            scroll();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history })
                });
                const data = await res.json();
                const el = document.getElementById(mid);
                
                if (el) {
                    if (data.reply) {
                        el.innerHTML = format(data.reply);
                        history.push({ role: 'assistant', content: data.reply });
                        save();
                        renderChats();
                    } else {
                        el.innerHTML = `<p class="text-red-500 text-sm">${data.error || 'Hata oluştu'}</p>`;
                    }
                }
            } catch {
                const el = document.getElementById(mid);
                if (el) {
                    el.innerHTML = '<p class="text-red-500 text-sm">Bağlantı hatası</p>';
                }
            }

            generating = false;
            btnSend.disabled = !input.value.trim();
            scroll();
            lucide.createIcons();
        }

        // Add Message
        function addMsg(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end msg-user' : 'flex justify-start msg-ai';
            
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'max-w-[80%] px-5 py-3 bg-gradient-to-br from-[#0881F0] to-[#00D4FF] text-white rounded-2xl rounded-br-md shadow-lg'
                : 'max-w-[80%] px-5 py-3 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 rounded-2xl rounded-bl-md shadow-sm';
            
            if (role === 'ai') {
                bubble.innerHTML = content;
            } else {
                bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</p>`;
            }
            
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }

        // Format
        function format(text) {
            let html = text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="bg-[#1a1a2e] text-[#e4e4e7] p-4 rounded-xl overflow-x-auto my-2"><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-[#e5e7eb] dark:bg-[#374151] px-1.5 py-0.5 rounded text-sm">$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3 class="text-base font-semibold mt-3 mb-1">$1</h3>')
                .replace(/^## (.+)$/gm, '<h2 class="text-lg font-semibold mt-4 mb-2">$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 class="text-xl font-bold mt-4 mb-2">$1</h1>')
                .replace(/^- (.+)$/gm, '<li class="ml-4 list-disc my-1">$1</li>')
                .replace(/\n\n/g, '</p><p class="mt-2">')
                .replace(/\n/g, '<br>');
            return `<div class="text-sm leading-relaxed text-gray-800 dark:text-gray-200"><p>${html}</p></div>`;
        }

        // Escape
        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        // Scroll
        function scroll() {
            messages.scrollTop = messages.scrollHeight;
        }

        // Toast
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast px-4 py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl shadow-lg text-sm font-medium';
            t.textContent = msg;
            toast.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Init
        renderChats();
    </script>
</body>
</html>
