    <style>
        :root {
            --bg-main: #f8f8f8;
            --sidebar-bg: #f9f9f9;
            --accent-blue: #0881F0;
            --border-color: #DBDBDB;
            --text-primary: #1B1818;
            --text-secondary: #666;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            overflow: hidden; 
        }
        
        .dark {
            --bg-main: #161616;
            --sidebar-bg: #1E1E1E;
            --border-color: #434343;
            --text-primary: #fff;
            --text-secondary: #999;
        }

        /* Gradient Yazı Tipi */
        .textGradient {
            background: linear-gradient(90deg, #0881F0 0%, #00D4FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Kod Blokları İçin Stil */
        pre { 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 1rem; 
            border-radius: 8px; 
            font-family: 'Fira Code', monospace; 
            font-size: 14px; 
            overflow-x: auto; 
            margin: 10px 0; 
        }

        /* Mesaj Balonları Animasyonu */
        .message-fade { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar Gizleme */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Yükleniyor Noktaları */
        .dot { animation: dot-pulse 1.5s infinite; }
        @keyframes dot-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Sidebar Geçişi */
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Z Letter Background */
        .placeholder-z-letter {
            position: absolute;
            left: 50%;
            top: -176px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }

        /* Input Container */
        .messageInputContainer {
            position: relative;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
        }

        /* Model Selector Button */
        .modelSelectorButton {
            background: transparent;
            border: none;
            padding: 0.5rem;
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Gradient Button */
        .gradientButton {
            background: linear-gradient(135deg, #0881F0 0%, #00D4FF 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .gradientButton:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(8, 129, 240, 0.3);
        }

        /* Send Button */
        .sendMessageButton {
            background: #E0E0E0;
            color: rgba(17, 15, 15, 0.2);
            border: none;
            padding: 0.375rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sendMessageButton:not(:disabled) {
            background: var(--accent-blue);
            color: white;
        }

        .sendMessageButton:not(:disabled):hover {
            background: #0670d0;
        }
    </style>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const chatWindow = document.getElementById('chatWindow');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-message-button');
        const sidebar = document.getElementById('sidebar');
        const thinkBtn = document.getElementById('think-btn');
        const webSearchBtn = document.getElementById('web-search-btn');

        let chatHistory = [];
        let autoThink = true;
        let webSearch = false;

        // Sidebar Kontrolü
        function toggleSidebar() {
            const isCollapsed = sidebar.dataset.collapsed === 'true';
            sidebar.dataset.collapsed = !isCollapsed;
            document.getElementById('chat-container').dataset.sidebar = !isCollapsed;
        }

        // Yeni Sohbet
        function newChat() {
            chatHistory = [];
            chatWindow.innerHTML = '';
            chatWindow.appendChild(welcomeScreen);
            welcomeScreen.classList.remove('hidden');
            chatInput.value = '';
            sendButton.disabled = true;
        }

        // Input Boyutu ve Buton Aktifliği
        chatInput.oninput = () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = chatInput.scrollHeight + 'px';
            sendButton.disabled = chatInput.value.trim() === '';
        };

        // Enter ile Gönderme
        chatInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendButton.disabled) handleSend();
            }
        };

        // Deep Think Toggle
        thinkBtn.onclick = () => {
            autoThink = !autoThink;
            thinkBtn.dataset.autoThink = autoThink;
            if (autoThink) {
                thinkBtn.classList.add('text-[#0881F0]', 'bg-[#F0F7FE]', 'dark:bg-white/10', 'dark:text-white');
                thinkBtn.classList.remove('hover:bg-black/5', 'dark:hover:bg-white/5');
            } else {
                thinkBtn.classList.remove('text-[#0881F0]', 'bg-[#F0F7FE]', 'dark:bg-white/10', 'dark:text-white');
                thinkBtn.classList.add('hover:bg-black/5', 'dark:hover:bg-white/5');
            }
        };

        // Web Search Toggle
        webSearchBtn.onclick = () => {
            webSearch = !webSearch;
            if (webSearch) {
                webSearchBtn.querySelector('button').classList.add('bg-blue-100', 'dark:bg-blue-900');
            } else {
                webSearchBtn.querySelector('button').classList.remove('bg-blue-100', 'dark:bg-blue-900');
            }
        };

        // Form Submit
        document.querySelector('form').onsubmit = (e) => {
            e.preventDefault();
            if (!sendButton.disabled) handleSend();
        };

        async function handleSend() {
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            welcomeScreen.classList.add('hidden');
            
            // Kullanıcı Mesajını Ekle
            appendMessage('user', prompt);
            
            // Hazırlıklar
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendButton.disabled = true;

            // AI Yanıtı Bekleniyor Balonu
            const aiMsgId = 'ai-' + Date.now();
            appendMessage('ai', `<span class="dot">.</span><span class="dot" style="animation-delay:0.2s">.</span><span class="dot" style="animation-delay:0.4s">.</span>`, aiMsgId);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: prompt, 
                        history: chatHistory,
                        autoThink: autoThink,
                        webSearch: webSearch
                    })
                });

                const data = await response.json();
                const aiBubble = document.getElementById(aiMsgId);
                
                if (data.reply) {
                    // HTML tag'lerini koruyarak (kod blokları için) içeriği bas
                    aiBubble.innerHTML = formatAIResponse(data.reply);
                    chatHistory.push({ role: 'user', content: prompt });
                    chatHistory.push({ role: 'assistant', content: data.reply });
                } else {
                    aiBubble.innerText = "Hata: " + (data.error || "Sunucu cevabı boş.");
                }

            } catch (err) {
                document.getElementById(aiMsgId).innerText = "İletişim koptu. Backend'i ve internetini kontrol et G63.";
            } finally {
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function appendMessage(role, text, id = null) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-fade`;
            
            const inner = document.createElement('div');
            inner.id = id;
            inner.className = `max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${
                role === 'user' 
                ? 'bg-blue-600 text-white rounded-br-none' 
                : 'bg-[#f4f4f4] text-stone-900 rounded-bl-none border border-black/5 dark:bg-[#2a2a2a] dark:text-white'
            }`;
            inner.innerHTML = text;
            
            div.appendChild(inner);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Basit Markdown/Kod Bloğu Formatlayıcı
        function formatAIResponse(text) {
            return text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\n/g, '<br>');
        }

        // Initialize
        thinkBtn.dataset.autoThink = autoThink;
    </script>
</body>
</html>
